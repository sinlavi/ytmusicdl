name: 🎵 Bale Music Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # restart every 6 hours to keep alive

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start Cloudflare WARP proxy
        run: |
          docker network create warp-net || true
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 15
          curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: python bale_music_bot.py
